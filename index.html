<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leaves and Bark</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: #b8cce0; font-family: 'Georgia', serif; }
      /* Name modal */
      #name-modal {
        display: none;
        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: rgba(184,204,224,0.7);
        backdrop-filter: blur(4px);
        z-index: 100;
      }
      #name-modal.hidden { display: none; }
      #name-box {
        background: #fdf6ec;
        border: 3px solid #c1663a;
        border-radius: 16px;
        padding: 32px 40px;
        text-align: center;
        font-family: 'Georgia', serif;
      }
      #name-box p { font-size: 22px; color: #3b1f0e; margin-bottom: 16px; }
      #name-input {
        font-family: 'Georgia', serif;
        font-size: 18px;
        border: 2px solid #c1663a;
        border-radius: 8px;
        padding: 8px 14px;
        outline: none;
        width: 200px;
        text-align: center;
        background: #fff;
      }
      #name-submit {
        display: block;
        margin: 16px auto 0;
        font-family: 'Georgia', serif;
        font-size: 16px;
        background: #c1663a;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 10px 32px;
        cursor: pointer;
      }

      /* Ghost name labels */
      #labels { position: absolute; inset: 0; pointer-events: none; }
      .ghost-label {
        position: absolute;
        transform: translate(-50%, -100%);
        font-family: 'Georgia', serif;
        font-size: 13px;
        color: #fff;
        background: rgba(0,0,0,0.35);
        padding: 2px 8px;
        border-radius: 8px;
        white-space: nowrap;
      }

      /* Touch controls — only visible on touch devices */
      #touch-controls { display: none; }
      @media (pointer: coarse) {
        #touch-controls {
          display: block;
          position: absolute;
          inset: 0;
          pointer-events: none;
        }
        #joystick-base {
          position: absolute;
          bottom: 48px; left: 48px;
          width: 110px; height: 110px;
          border-radius: 50%;
          background: rgba(0,0,0,0.18);
          border: 3px solid rgba(0,0,0,0.3);
          pointer-events: all;
          touch-action: none;
        }
        #joystick-knob {
          position: absolute;
          top: 50%; left: 50%;
          width: 50px; height: 50px;
          border-radius: 50%;
          background: rgba(0,0,0,0.45);
          border: 2px solid rgba(255,255,255,0.3);
          transform: translate(-50%, -50%);
          pointer-events: none;
        }
        #bark-btn {
          position: absolute;
          bottom: 60px; right: 52px;
          width: 84px; height: 84px;
          border-radius: 50%;
          background: rgba(193,102,58,0.7);
          border: 3px solid rgba(0,0,0,0.35);
          color: white;
          font-size: 28px;
          display: flex; align-items: center; justify-content: center;
          pointer-events: all;
          touch-action: none;
          user-select: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="name-modal">
      <div id="name-box">
        <p>What's your name?</p>
        <input id="name-input" type="text" maxlength="16" placeholder="your name..." autofocus />
        <button id="name-submit">Play ↵</button>
      </div>
    </div>
    <div id="labels"></div>
    <div id="mute-btn" style="position:absolute;top:14px;right:20px;color:#1a1a1a;font-size:18px;font-weight:bold;cursor:pointer;user-select:none;letter-spacing:0.05em;font-family:Georgia,serif;">♪</div>
    <div id="touch-controls">
      <div id="joystick-base"><div id="joystick-knob"></div></div>
      <div id="bark-btn">🐾</div>
    </div>
    <div id="app"></div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
