<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leaves and Bark</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: #b8cce0; font-family: 'Georgia', serif; }
      #hud {
        position: absolute;
        top: 16px; left: 20px;
        color: #1a1a1a;
        font-size: 20px;
        font-weight: bold;
        pointer-events: none;
        letter-spacing: 0.05em;
      }
      #hud span { color: #c1663a; }

      /* Touch controls — only visible on touch devices */
      #touch-controls { display: none; }
      @media (pointer: coarse) {
        #touch-controls {
          display: block;
          position: absolute;
          inset: 0;
          pointer-events: none;
        }
        #joystick-base {
          position: absolute;
          bottom: 48px; left: 48px;
          width: 110px; height: 110px;
          border-radius: 50%;
          background: rgba(0,0,0,0.18);
          border: 3px solid rgba(0,0,0,0.3);
          pointer-events: all;
          touch-action: none;
        }
        #joystick-knob {
          position: absolute;
          top: 50%; left: 50%;
          width: 50px; height: 50px;
          border-radius: 50%;
          background: rgba(0,0,0,0.45);
          border: 2px solid rgba(255,255,255,0.3);
          transform: translate(-50%, -50%);
          pointer-events: none;
        }
        #bark-btn {
          position: absolute;
          bottom: 60px; right: 52px;
          width: 84px; height: 84px;
          border-radius: 50%;
          background: rgba(193,102,58,0.7);
          border: 3px solid rgba(0,0,0,0.35);
          color: white;
          font-size: 28px;
          display: flex; align-items: center; justify-content: center;
          pointer-events: all;
          touch-action: none;
          user-select: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="hud">🍂 <span id="score">0</span> leaves</div>
    <div id="mute-btn" style="position:absolute;top:14px;right:20px;color:#1a1a1a;font-size:18px;font-weight:bold;cursor:pointer;user-select:none;letter-spacing:0.05em;font-family:Georgia,serif;">♪</div>
    <div id="touch-controls">
      <div id="joystick-base"><div id="joystick-knob"></div></div>
      <div id="bark-btn">🐾</div>
    </div>
    <div id="app"></div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
