<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Breakout</title>
    <style>
      body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; }
      #hud { position: absolute; top: 10px; left: 10px; color: white; font-size: 20px; font-weight: bold; pointer-events: none; }
      #message { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 32px; font-weight: bold; pointer-events: none; text-align: center; display: none; }
    </style>
  </head>
  <body>
    <div id="hud">Score: <span id="score">0</span></div>
    <div id="message"></div>
    <div id="app"></div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
